name: Pipeline diario

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 06:00 Perú (UTC-5)
  # workflow_dispatch queda abierto para disparo manual Y para el respaldo
  # externo: un cronjob en cron-job.org llama a la API de GitHub
  # (POST /actions/workflows/pipeline_diario.yml/dispatches) todos los dias
  # a las 11:05 UTC. El 'schedule' nativo de GitHub es best-effort y no
  # garantiza el horario (confirmado empiricamente: no disparo ni una vez
  # en varios dias seguidos durante el desarrollo de este pipeline); un
  # dispatch por API es una llamada directa, mucho mas confiable. Si ambos
  # disparan el mismo dia no hay problema -- el pipeline es idempotente.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar próximos partidos y cuotas (modo diario)
        run: python descargar_partidos.py --diario

      - name: Registrar cierre de cuotas (CLV) para partidos de hoy
        run: python logger_predicciones.py registrar-cierre
        continue-on-error: true

      - name: Generar picks (solo hoy)
        run: python generador_picks_ligas.py --solo-hoy

      - name: Registrar predicciones del día (log calibración)
        run: python logger_predicciones.py registrar
        continue-on-error: true

      - name: Sincronizar resultados finalizados (log calibración)
        run: python logger_predicciones.py sync-resultados 4
        continue-on-error: true

      - name: Liquidar historial de picks (ganados/perdidos)
        run: python logger_predicciones.py liquidar-historial
        continue-on-error: true

      - name: Recalcular calibración (MSE / sesgo por liga)
        run: python logger_predicciones.py calibrar
        continue-on-error: true

      # Generar web AL FINAL: archiva los picks de hoy en historial_picks.csv
      # y ya refleja la liquidación de resultados pasados (sync-resultados +
      # liquidar-historial corrieron arriba) en la misma corrida -- si fuera
      # antes, el historial mostrado en la web quedaría un día atrasado.
      - name: Generar web
        run: python generar_web.py

      - name: Commit y push de los resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/index.html Data/picks_hoy.json Data/partidos/proximos.csv Predicciones/predicciones_hoy.json \
                     Data/predicciones_log.csv Data/resultados_log.csv Data/calibracion.json Data/historial_picks.csv
          git diff --staged --quiet || git commit -m "chore: pipeline diario $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
